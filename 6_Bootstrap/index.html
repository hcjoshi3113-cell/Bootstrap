<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" >
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="container mt-5">
        <div class="row d-flex flex-row">
            <div class="col-12 col-md-3 bg-info text-center">col-1</div>
            <div class="col-12 col-md-3 bg-primary text-center">col-2</div>
            <div class="col-12 col-md-3 bg-danger text-center">col-3</div>
        </div>
        <div class="row d-flex flex-column">
            <div class="col-12 col-md-3 bg-warning text-center">col-1</div>
            <div class="col-12 col-md-3 bg-info text-center">col-2</div>
            <div class="col-12 col-md-3 bg-success text-center">col-3</div>
        </div>
        <div class="row d-flex flex-row-reverse">
            <div class="col-12 col-md-3 bg-danger text-center">col-1</div>
            <div class="col-12 col-md-3 bg-warning text-center">col-2</div>
            <div class="col-12 col-md-3 bg-success text-center">col-3</div>
        </div>
        <div class="row d-flex flex-column-reverse">
            <div class="col-12 col-md-3 bg-danger text-center">col-1</div>
            <div class="col-12 col-md-3 bg-info text-center">col-2</div>
            <div class="col-12 col-md-3 bg-warning text-center">col-3</div>
        </div>
      
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
